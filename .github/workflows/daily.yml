name: Newsletter diária no WhatsApp

on:
  schedule:
    # 10:07 UTC = 07:07 em Brasília (o GitHub atrasa execuções no minuto :00,
    # então :07 chega mais pontualmente)
    - cron: "7 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  enviar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests feedparser tzdata

      - name: Montar a edição, publicar no site e enviar no WhatsApp
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python newsletter.py

      - name: Salvar a edição no repositório (alimenta o GitHub Pages)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "Edição de $(TZ=America/Sao_Paulo date +%Y-%m-%d)"
          git push
