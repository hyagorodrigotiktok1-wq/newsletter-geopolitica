name: Newsletter diária no WhatsApp

on:
  schedule:
    # 10:07 UTC = 07:07 em Brasília (o GitHub atrasa execuções no minuto :00,
    # então :07 chega mais pontualmente)
    - cron: "7 10 * * *"
  workflow_dispatch: {}

jobs:
  enviar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests feedparser tzdata

      - name: Montar e enviar a newsletter
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python newsletter.py
